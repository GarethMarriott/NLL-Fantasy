<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found - NLL Fantasy</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .error-container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
            padding: 60px 40px;
            max-width: 600px;
        }
        h1 {
            font-size: 120px;
            color: #667eea;
            margin: 0;
            font-weight: 700;
        }
        h2 {
            font-size: 32px;
            color: #333;
            margin: 20px 0;
            font-weight: 600;
        }
        p {
            font-size: 16px;
            color: #666;
            margin: 15px 0;
            line-height: 1.6;
        }
        .button {
            display: inline-block;
            margin-top: 30px;
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }
        .requested-path {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 5px;
            margin: 20px 0;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            font-size: 13px;
            color: #666;
            word-break: break-all;
        }
    </style>
</head>
<body>
    <div class="error-container">
        <h1>404</h1>
        <h2>Page Not Found</h2>
        <p>Sorry, the page you're looking for doesn't exist or has been moved.</p>
        
        <div class="requested-path">
            Requested: {{ request.path|default:"/" }}
        </div>
        
        <div>
            <a href="/" class="button">Go to Home</a>
        </div>
        
        <p style="margin-top: 40px; font-size: 14px; color: #999;">
            If you believe this is an error, please <a href="/bugs/report/" style="color: #667eea;">report it</a>.
        </p>
    </div>
</body>
</html>
