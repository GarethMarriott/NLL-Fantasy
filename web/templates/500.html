<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Error - NLL Fantasy</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .error-container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
            padding: 60px 40px;
            max-width: 600px;
        }
        h1 {
            font-size: 120px;
            color: #f5576c;
            margin: 0;
            font-weight: 700;
        }
        h2 {
            font-size: 32px;
            color: #333;
            margin: 20px 0;
            font-weight: 600;
        }
        p {
            font-size: 16px;
            color: #666;
            margin: 15px 0;
            line-height: 1.6;
        }
        .button {
            display: inline-block;
            margin-top: 30px;
            padding: 12px 30px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(245, 87, 108, 0.4);
        }
    </style>
</head>
<body>
    <div class="error-container">
        <h1>500</h1>
        <h2>Server Error</h2>
        <p>Oops! Something went wrong on our end. Our team has been notified and is working to fix it.</p>
        
        <p style="margin-top: 30px; font-size: 14px; color: #999;">
            Please try again in a few moments, or <a href="/" style="color: #f5576c;">return to the home page</a>.
        </p>
        
        <div>
            <a href="/bugs/report/" class="button">Report This Issue</a>
        </div>
    </div>
</body>
</html>
